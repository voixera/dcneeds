services:
  - type: worker
    name: drx-discord-bots
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: python render_worker.py
    region: singapore
    plan: starter
    maxShutdownDelaySeconds: 60
    disk:
      name: bot-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: ENABLED_BOTS
        value: drxsrvrmanage,drxfarm,oauthguard
      - key: ALLOW_MULTI_BOT
        value: "true"
      - key: MAX_RUNNING_BOTS
        value: "3"
      - key: SKIP_MISSING_BOT_TOKENS
        value: "true"
      - key: RESTART_FAILED_BOTS
        value: "true"
      - key: RESTART_DELAY_SECONDS
        value: "10"
      - key: PERSISTENT_DATA_DIR
        value: /app/data
      - key: FFMPEG_PATH
        value: ffmpeg
      - key: FARM_ACTIVITY_TIMEZONE
        value: Asia/Jakarta
      - key: DISCORD_FARM_TOKEN
        sync: false
      - key: DISCORD_SRVRMANAGE_TOKEN
        sync: false
      - key: DISCORD_TOKEN
        sync: false
      - key: CLIENT_ID
        sync: false
